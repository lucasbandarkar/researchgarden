<body>

    <!-- Research Garden -->
    <svg id="flower_template" xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 20 20">
        <ellipse rx="10" ry="20" transform="rotate(0)" fill="[[COLOR]]" class="petal [[FLOWER_CLASS]]"/>
        <ellipse rx="10" ry="20" transform="rotate(45)" fill="[[COLOR]]" class="petal [[FLOWER_CLASS]]"/>
        <ellipse rx="10" ry="20" transform="rotate(90)" fill="[[COLOR]]" class="petal [[FLOWER_CLASS]]"/>
        <ellipse rx="10" ry="20" transform="rotate(135)" fill="[[COLOR]]" class="petal [[FLOWER_CLASS]]"/>
        <ellipse rx="10" ry="20" transform="rotate(180)" fill="[[COLOR]]" class="petal [[FLOWER_CLASS]]"/>
        <ellipse rx="10" ry="20" transform="rotate(225)" fill="[[COLOR]]" class="petal [[FLOWER_CLASS]]"/>
        <ellipse rx="10" ry="20" transform="rotate(270)" fill="[[COLOR]]" class="petal [[FLOWER_CLASS]]"/>
        <ellipse rx="10" ry="20" transform="rotate(315)" fill="[[COLOR]]" class="petal [[FLOWER_CLASS]]"/>
        <circle r="6" fill="url(#center_gradient)"/>
    </svg>
    <div id="garden_title">Lucas's Research Garden <span id="garden_title_scroll_hint">Scroll →</span></div>
    <div id="garden_container">
        <svg id="garden" preserveAspectRatio="xMinYMin meet"></svg>
     </div>
     <div id="garden_scroll_hint">← scroll to explore →</div>
    <div id="paper_modal_backdrop" onclick="$('#paper_modal').fadeOut(200); $('#paper_modal_backdrop').fadeOut(200);"></div>
    <div id="paper_modal">
        <!-- a close icon at the top right -->
        <div id="paper_modal_close" onclick="$('#paper_modal').fadeOut(200); $('#paper_modal_backdrop').fadeOut(200);">&#10005;</div>
        <div id="paper_modal_title"></div>
        <div id="paper_modal_venue"></div>
        <div id="paper_modal_content"></div>
        <div id="paper_modal_links"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Publication data as HTML (editable, crawlable, used by garden.js) -->
    <details id="paper_data" hidden>
    <summary>Selected Publications (click to expand)</summary>
        <!-- ===== Interpretability & Model Analysis (newest, leftmost) ===== -->
        <article class="paper-entry" data-id="multilingual_routing" data-title="Multilingual MoEs" data-venue="ICLR 2026"
            data-url="https://openreview.net/forum?id=ZoZR0x7tTD"
            data-root-node="1" data-root-name="Multilingual|Interpretability" data-root-color="#8FC7FF" data-label-side="left"
            data-coauthors="Chenyuan Yang, Mohsen Fayyaz, Junlin Hu, Nanyun Peng"
            data-full-title="Multilingual Routing in Mixture-of-Experts"
            data-summary="Analyzes how MoE language models route multilingual inputs, finding language-specific routing at early and late layers and stronger cross-lingual alignment in the middle. The work connects routing similarity with multilingual performance and tests simple routing interventions that improve cross-lingual generalization."
            data-links-arxiv="https://arxiv.org/abs/2510.04694"
            data-indirect-connections="knowledge_localization, mt_pruning">
        </article>

        <article class="paper-entry" data-id="parametric_scripts" data-title="Cross-Script Knowledge" data-venue="arXiv 2026"
            data-url="https://arxiv.org/abs/2603.17070" data-parent="multilingual_routing"
            data-coauthors="Alan Ansell, Trevor Cohn"
            data-full-title="Large Reasoning Models Struggle to Transfer Parametric Knowledge Across Scripts"
            data-summary="Shows that reasoning LLMs can struggle to transfer factual parametric knowledge across writing systems. The analysis points to script mismatch as a major predictor of transfer failure and explores post-training data that teaches models to reason through transliteration ambiguity.">
        </article>

        <!-- ===== Modularity for Cross-Lingual Transfer ===== -->
        <article class="paper-entry" data-id="layer_swapping" data-title="Layer Swapping" data-venue="ICLR 2025 Spotlight"
            data-url="https://openreview.net/forum?id=vQhn4wrQ6j"
            data-root-node="1" data-root-name="Using|Modularity" data-root-color="#B5E48C"
            data-indirect-connections="multilingual_routing"
            data-coauthors="Benjamin Muller, Pritish Yuvraj, Rui Hou, Nayan Singhal, Hongjiang Lv, Bing Liu"
            data-full-title="Layer Swapping for Zero-Shot Cross-Lingual Transfer in Large Language Models"
            data-summary="Studies whether cross-lingual transfer can be improved by separating language-specific and task-specific parameters. The method swaps selected layers between models to transfer capabilities zero-shot across languages."
            data-links-arxiv="https://arxiv.org/abs/2410.01335">
        </article>

        <article class="paper-entry" data-id="knowledge_localization" data-title="Knowledge Localization" data-venue="arXiv 2026"
            data-url="https://arxiv.org/abs/2603.17102" data-parent="layer_swapping" data-is-left-child="1"
            data-coauthors="Alan Ansell, Trevor Cohn"
            data-full-title="Knowledge Localization in Mixture-of-Experts LLMs Using Cross-Lingual Inconsistency"
            data-summary="Uses cross-lingual inconsistency as an interpretability signal for MoE models. By contrasting languages where a model succeeds or fails on the same factual query, the method identifies small sets of experts that causally matter for recalling specific knowledge.">
        </article>

        <article class="paper-entry" data-id="mt_pruning" data-title="Extracting MT Models" data-venue="arXiv 2026"
            data-url="https://arxiv.org/abs/2605.28042" data-parent="knowledge_localization" data-is-left-child="1" data-label-side="right"
            data-coauthors="Liu Martin, Nanyun Peng"
            data-full-title="Extracting Small Translation Specialists from LLMs by Aggressively Pruning Experts"
            data-summary="">
        </article>

        <article class="paper-entry" data-id="model_merging" data-title="Model Merging" data-venue="MRL Workshop 2025"
            data-url="https://aclanthology.org/2025.mrl-main.10/" data-parent="layer_swapping"
            data-coauthors="Nanyun Peng"
            data-full-title="The Unreasonable Effectiveness of Model Merging for Cross-Lingual Transfer in LLMs"
            data-summary="Investigates modular post-training and model merging for low-resource cross-lingual transfer. The paper finds that task and language capabilities can often be composed by training separate experts and merging them, with layer-swapping emerging as a surprisingly strong method."
            data-links-arxiv="https://arxiv.org/abs/2505.18356">
        </article>

        <!-- ===== Multilingual Evaluations ===== -->
        <article class="paper-entry" data-id="belebele" data-title="Belebele" data-venue="ACL 2024"
            data-url="https://aclanthology.org/2024.acl-long.44/"
            data-root-node="1" data-root-name="Multilingual|Evaluations" data-root-color="#FFD166"
            data-coauthors="Davis Liang, Benjamin Muller, Mikel Artetxe, Satya Narayan Shukla, Donald Husa, Naman Goyal, Abhinandan Krishnan, Luke Zettlemoyer, Madian Khabsa"
            data-full-title="The Belebele Benchmark: a Parallel Reading Comprehension Dataset in 122 Language Variants"
            data-summary="Introduces a fully parallel multiple-choice reading comprehension benchmark spanning 122 language variants. Belebele enables direct comparison of multilingual understanding across high-, medium-, and low-resource languages."
            data-links-arxiv="https://arxiv.org/abs/2308.16884"
            data-links-website="https://facebookresearch.github.io/belebele/"
            data-links-code="https://github.com/facebookresearch/belebele"
            data-links-data="https://huggingface.co/datasets/facebook/belebele">
        </article>

        <article class="paper-entry" data-id="translation_proxy" data-title="MT as Proxy Eval" data-venue="arXiv 2026"
            data-url="https://arxiv.org/abs/2601.11778" data-parent="belebele"
            data-coauthors="Sheriff Issaka, Erick Rosas Gonzalez, Lieqi Liu, Evans Kofi Agyei, Nanyun Peng, David Ifeoluwa Adelani, Francisco Guzman, Saadia Gabriel"
            data-full-title="Translation as a Scalable Proxy for Multilingual Evaluation"
            data-summary="Tests whether translation quality can serve as a scalable first-pass proxy for broader multilingual capability. Across many models, benchmarks, and translation metrics, the paper finds strong correlations between translation performance and downstream multilingual task success.">
        </article>

        <!-- ===== NLU Foundations & Event Extraction ===== -->
        <article class="paper-entry" data-id="headline_grouping" data-title="Headline Grouping" data-venue="NAACL 2021"
            data-url="https://aclanthology.org/2021.naacl-main.255/"
            data-root-node="1" data-root-name="NLU &amp;|Event Extraction" data-root-color="#F28482"
            data-coauthors="Philippe Laban, Marti Hearst"
            data-full-title="News Headline Grouping as a Challenging NLU Task"
            data-summary="Introduces headline grouping as an NLU task: deciding whether headlines refer to the same real-world event. The task is challenging because headlines compress, frame, and omit event details in ways that make semantic grouping non-trivial."
            data-links-arxiv="https://arxiv.org/abs/2105.05391"
            data-links-code="https://github.com/tingofurro/headline_grouping"
            data-links-data="https://huggingface.co/datasets/hlgd">
        </article>

        <article class="paper-entry" data-id="snare" data-title="SNaRe" data-venue="EMNLP 2025"
            data-url="https://aclanthology.org/2025.emnlp-main.1039/" data-parent="headline_grouping"
            data-coauthors="Tanmay Parekh, Yuxuan Dong, Artin Kim, I-Hung Hsu, Kai-Wei Chang, Nanyun Peng"
            data-full-title="SNaRe: Domain-aware Data Generation for Low-Resource Event Detection"
            data-summary="Develops domain-aware data generation for low-resource event detection. The work targets event extraction settings where labeled domain-specific data is scarce and uses generation to improve detection performance."
            data-links-arxiv="https://arxiv.org/abs/2502.17394"
            data-links-code="https://github.com/PlusLabNLP/SNaRe">
        </article>

        <article class="paper-entry" data-id="coherence_shuffle" data-title="Measuring Coherence" data-venue="ACL 2021"
            data-url="https://aclanthology.org/2021.acl-short.134/" data-parent="headline_grouping"
            data-coauthors="Philippe Laban, Luke Dai, Marti Hearst"
            data-full-title="Can Transformer Models Measure Coherence In Text? Re-Thinking the Shuffle Test"
            data-summary="Revisits the shuffle test for measuring discourse coherence with transformer models. The paper examines whether models genuinely capture coherence or exploit artifacts in how incoherent examples are constructed."
            data-links-arxiv="https://arxiv.org/abs/2107.03448"
            data-links-code="https://github.com/tingofurro/shuffle_test">
        </article>
    </details>

    <script src="garden.js?v=12"></script>
    <script>
        // Read papers from HTML data attributes
        var papers = [];
        $('#paper_data .paper-entry').each(function() {
            var $el = $(this);
            var paper = {
                id: $el.data('id'),
                title: ($el.data('title') || '').replace(/\|/g, '\n'),
                venue: $el.data('venue'),
                url: $el.data('url'),
                coauthors: $el.data('coauthors') ? $el.data('coauthors').split(', ') : [],
                full_title: $el.data('full-title'),
                summary: $el.data('summary')
            };
            if ($el.data('label-side')) { paper.label_side = $el.data('label-side'); }
            if ($el.data('root-node')) { paper.root_node = 1; paper.root_name = ($el.data('root-name') || '').replace(/\|/g, '\n'); paper.root_color = $el.data('root-color'); }
            if ($el.data('parent')) { paper.parent = $el.data('parent'); }
            if ($el.data('is-left-child')) { paper.is_left_child = 1; }
            if ($el.data('indirect-connections')) {
                paper.indirect_connections = $el.data('indirect-connections').split(', ');
            }
            // Collect additional links from data-links-* attributes
            var additional_links = {};
            $.each(this.attributes, function() {
                if (this.name.startsWith('data-links-')) {
                    var key = this.name.replace('data-links-', '').replace(/_/g, ' ');
                    additional_links[key] = this.value;
                }
            });
            if (Object.keys(additional_links).length > 0) { paper.additional_links = additional_links; }
            papers.push(paper);
        });
        build_garden(papers);

        // Generate JSON-LD structured data from the same HTML source
        var ldItems = papers.map(function(p) {
            var authors = [{"@type": "Person", "name": "Lucas Bandarkar"}];
            p.coauthors.forEach(function(c) { authors.push({"@type": "Person", "name": c}); });
            return {"@type": "ScholarlyArticle", "name": p.full_title, "url": p.url, "author": authors};
        });
        var ldScript = document.createElement('script');
        ldScript.type = 'application/ld+json';
        ldScript.text = JSON.stringify({"@context": "https://schema.org", "@type": "ItemList", "name": "Lucas Bandarkar's Research Publications", "itemListElement": ldItems});
        document.head.appendChild(ldScript);
    </script>

</body>
</html>
